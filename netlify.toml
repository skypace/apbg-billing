[build]
  publish = "public"
  functions = "netlify/functions"

# Branch deploys — "dev" branch auto-deploys to dev--apbg-billing.netlify.app
[context.branch-deploy]
  # Same build config; shares env vars + blob stores with production

[functions]
  node_bundler = "esbuild"

[functions."resq-sf-sync"]
  timeout = 60

[functions."resq-sf-sync-background"]
  timeout = 900

[functions."resq-sf-sync-cron"]
  timeout = 900
  schedule = "*/5 * * * *"

[functions."health-watchdog"]
  timeout = 60

[functions."master-health"]
  timeout = 30

[functions."master-health-cron"]
  timeout = 60

[functions."sync-qbo"]
  timeout = 900
  schedule = "0 9 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
